{% extends "base.html" %}

{% block content %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">

                    <!-- Header -->
                    <h1 class="text-center mb-4">Register to <span class="text-gradient">CollabStudy</span></h1>

                    <!-- Registration Form -->
                    <form action="/register" method="POST">

                        <!-- Full Name -->
                        <div class="mb-3">
                            <label for="fullName" class="form-label fw-semibold">Full Name</label>
                            <input type="text" class="form-control form-control-lg rounded-3" id="fullName"
                                name="fullName" placeholder="Enter your full name" required>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Email Address</label>
                            <input type="email" class="form-control form-control-lg rounded-3" id="email" name="email"
                                placeholder="Enter your email" required>
                            <div class="form-text">We'll never share your email with anyone else.</div>
                        </div>

                        <!-- Country -->
                        <div class="mb-3">
                            <label for="country" class="form-label fw-semibold">Country</label>
                            <select class="form-select form-select-lg rounded-3" id="country" name="country" required>
                                <option value="" selected disabled>Select your country</option>
                                <option value="USA">United States</option>
                                <option value="UK">United Kingdom</option>
                                <option value="Canada">Canada</option>
                                <option value="Australia">Australia</option>
                                <option value="India">India</option>
                                <option value="Pakistan">Pakistan</option>
                                <option value="Bangladesh">Bangladesh</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <!-- Username -->
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">Username</label>
                            <input type="text" class="form-control form-control-lg rounded-3" id="username"
                                name="username" placeholder="Choose a username" required>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold">Password</label>
                            <input type="password" class="form-control form-control-lg rounded-3" id="password"
                                name="password" placeholder="Create a password" required>
                            <div class="form-text">Password must be at least 8 characters long.</div>
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label fw-semibold">Confirm Password</label>
                            <input type="password" class="form-control form-control-lg rounded-3" id="confirmPassword"
                                name="confirmPassword" placeholder="Re-enter your password" required>
                                <div class="form-text">Confirm Password must be same as Password.</div>
                        </div>

                        <!-- Terms and Conditions -->
                        <div class="mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="terms" required>
                                <label class="form-check-label" for="terms">
                                    I agree to the <a href="/terms" class="text-decoration-none">Terms of Service</a>
                                    and
                                    <a href="/privacy" class="text-decoration-none">Privacy Policy</a>
                                </label>
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <button type="submit"
                            class="btn btn-primary-custom text-white w-100 py-3 fw-bold rounded-3 mb-3">
                            Register Now
                        </button>

                        <!-- Login Link -->
                        <p class="text-center mb-0">
                            Already have an account?
                            <a href="/login" class="text-decoration-none fw-semibold">Log in</a>
                        </p>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>



{% endblock %}
