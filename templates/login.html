{% extends "base.html" %}
{% block content %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">
                    
                    <!-- Header -->
                    <h1 class="text-center mb-4">Login to <span class="text-gradient">CollabStudy</span></h1>
                    
                    <!-- Login Form -->
                    <form action="/login" method="POST">
                        
                        <!-- Username Field -->
                        <div class="mb-4">
                            <label for="username" class="form-label fw-semibold">Username</label>
                            <input type="text" class="form-control form-control-lg rounded-3" 
                                   id="username" name="username" 
                                   placeholder="Enter your username" 
                                   required>
                        </div>
                        
                        <!-- Password Field -->
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">Password</label>
                            <input type="password" class="form-control form-control-lg rounded-3" 
                                   id="password" name="password" 
                                   placeholder="Enter your password" 
                                   required>
                        </div>
                        
                        <!-- Remember Me & Forgot Password -->
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label" for="rememberMe">
                                    Remember me
                                </label>
                            </div>
                            <a href="/forgot-password" class="text-decoration-none">Forgot Password?</a>
                        </div>
                        
                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-primary-custom text-white w-100 py-3 fw-bold rounded-3 mb-3">
                            <a href="/admin_dashboard" class="text-decoration-none" id="login-btn">Log In</a>
                        </button>
                        
                        <!-- Sign Up Link -->
                        <p class="text-center mb-0">
                            Don't have an account? 
                            <a href="/register" class="text-decoration-none fw-semibold">Sign up</a>
                        </p>
                        
                    </form>
                    
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
